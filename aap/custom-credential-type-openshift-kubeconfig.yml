---
name: OpenShift Must-Gather Kubeconfig
description: >-
  Platform-owned kubeconfig credential for the controlled OpenShift
  must-gather AAP MVP. Do not grant dev users access to credentials of this
  type.
kind: cloud
inputs:
  fields:
    - id: kubeconfig
      type: string
      label: Kubeconfig
      secret: true
      multiline: true
  required:
    - kubeconfig
injectors:
  file:
    template: !unsafe "{{ kubeconfig }}"
  env:
    # Red Hat AAP custom credential file injectors document tower.filename.
    KUBECONFIG: !unsafe "{{ tower.filename }}"
