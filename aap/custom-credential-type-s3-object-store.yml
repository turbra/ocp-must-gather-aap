---
name: S3 Object Store Access
description: >-
  Platform-owned S3-compatible object storage access for must-gather artifact
  upload. Do not grant dev users access to credentials of this type.
kind: cloud
inputs:
  fields:
    - id: access_key
      type: string
      label: Access key
    - id: secret_key
      type: string
      label: Secret key
      secret: true
    - id: region
      type: string
      label: Region
      help_text: Optional region value for S3-compatible storage.
  required:
    - access_key
    - secret_key
injectors:
  env:
    AWS_ACCESS_KEY_ID: !unsafe "{{ access_key }}"
    AWS_SECRET_ACCESS_KEY: !unsafe "{{ secret_key }}"
    AWS_REGION: !unsafe "{{ region }}"
